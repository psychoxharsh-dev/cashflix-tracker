<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lead Tracker - CashFlix ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#111827; min-height:100vh; display:flex; justify-content:center; align-items:flex-start; padding:24px 0 40px; }
.wrap { width:100%; max-width:420px; margin:0 16px; }
.main-box { background:#e8eaf0; border-radius:28px; overflow:hidden; box-shadow:0 24px 64px rgba(0,0,0,.6); }
.logo-wrap { display:flex; justify-content:center; padding-top:40px; padding-bottom:14px; }
.logo-outer { width:80px; height:80px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 16px rgba(0,0,0,.13); }
.logo-inner { width:58px; height:58px; border-radius:14px; background:linear-gradient(135deg,#1a1a2e,#16213e); display:flex; align-items:center; justify-content:center; }
.title-wrap { text-align:center; padding:0 24px 24px; }
.title { font-weight:900; font-size:30px; color:#0f172a; letter-spacing:-0.5px; }
.subtitle { font-weight:400; font-size:16px; color:#94a3b8; margin-top:6px; }
.form-wrap { padding:0 20px 32px; display:flex; flex-direction:column; gap:14px; }
.pill { background:#fff; border-radius:50px; padding:0 16px; display:flex; align-items:center; gap:12px; height:56px; box-shadow:0 2px 12px rgba(0,0,0,.08); border:2px solid transparent; transition:border .2s; }
.pill.focused { border-color:#0ea5e9; }
.pill input { flex:1; border:none; outline:none; font-size:15px; font-weight:500; color:#374151; background:transparent; font-family:'Inter',sans-serif; }
.date-pill { background:#fff; border-radius:50px; padding:0 16px; display:flex; align-items:center; gap:8px; height:56px; box-shadow:0 2px 12px rgba(0,0,0,.08); border:2px solid #0ea5e9; }
.date-pill input[type="date"] { flex:1; border:none; outline:none; font-size:13px; font-weight:700; color:#1e293b; background:transparent; font-family:'Inter',sans-serif; min-width:0; cursor:pointer; }
.date-sep { color:#94a3b8; font-weight:600; font-size:13px; flex-shrink:0; }
.select-box { height:50px; border-radius:50px; border:none; background:#fff; font-size:14px; font-weight:600; color:#1e293b; outline:none; box-shadow:0 2px 10px rgba(0,0,0,.08); font-family:'Inter',sans-serif; cursor:pointer; padding-left:18px; width:100%; }
.track-btn { height:54px; border-radius:50px; background:linear-gradient(135deg,#0ea5e9,#0369a1); color:#fff; font-weight:800; font-size:17px; border:none; cursor:pointer; letter-spacing:.5px; box-shadow:0 4px 24px rgba(14,165,233,.45); font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; gap:12px; transition:all .2s; }
.track-btn:hover { transform:translateY(-2px); }
.track-btn:disabled { opacity:.7; cursor:not-allowed; transform:none; }
.search-pill { background:#fff; border-radius:50px; padding:0 16px; display:flex; align-items:center; gap:12px; height:56px; box-shadow:0 2px 12px rgba(0,0,0,.08); border:2px solid transparent; transition:border .2s; margin-bottom:14px; }
.search-pill.focused { border-color:#0ea5e9; }
.search-pill input { flex:1; border:none; outline:none; font-size:14px; font-weight:500; color:#374151; background:transparent; font-family:'Inter',sans-serif; }
.result-card { background:#e8eaf0; border-radius:20px; overflow:hidden; margin-bottom:14px; box-shadow:0 8px 32px rgba(0,0,0,.3); }
.result-row { display:flex; justify-content:space-between; align-items:center; padding:15px 22px; border-bottom:1px solid #d1d5db; }
.result-row:last-child { border-bottom:none; }
.row-label { font-weight:800; font-size:14px; color:#0f172a; }
.row-val { font-weight:600; font-size:14px; color:#374151; }
.badge { color:#fff; padding:5px 16px; border-radius:8px; font-weight:700; font-size:13px; }
.no-result { background:#e8eaf0; border-radius:20px; padding:36px 24px; text-align:center; box-shadow:0 8px 32px rgba(0,0,0,.3); }
.no-result-title { font-weight:700; font-size:16px; color:#374151; margin-bottom:6px; }
.no-result-sub { color:#94a3b8; font-size:13px; }
.back-btn { width:100%; height:54px; border-radius:50px; background:linear-gradient(135deg,#0ea5e9,#0369a1); color:#fff; font-weight:800; font-size:16px; border:none; cursor:pointer; letter-spacing:.5px; box-shadow:0 4px 24px rgba(14,165,233,.45); font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; gap:12px; }
.toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); color:#fff; padding:13px 30px; border-radius:50px; font-weight:700; font-size:13px; z-index:9999; box-shadow:0 4px 24px rgba(0,0,0,.3); white-space:nowrap; font-family:'Inter',sans-serif; display:none; }
.spinner { width:18px; height:18px; border:3px solid rgba(255,255,255,.3); border-top:3px solid #fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block; }
@keyframes spin { to{transform:rotate(360deg)} }
</style>
</head>
<body>
<div class="wrap">

  <div class="main-box" id="mainBox">
    <div class="logo-wrap">
      <div class="logo-outer">
        <div class="logo-inner">
          <svg width="38" height="38" viewBox="0 0 38 38" fill="none">
            <circle cx="14" cy="12" r="5" stroke="#7c6fcd" stroke-width="2.5"/>
            <circle cx="24" cy="26" r="5" stroke="#b06ab3" stroke-width="2.5"/>
            <line x1="14" y1="17" x2="24" y2="21" stroke="#7c6fcd" stroke-width="2" stroke-dasharray="2 2"/>
            <circle cx="14" cy="12" r="2" fill="#7c6fcd"/>
            <circle cx="24" cy="26" r="2" fill="#b06ab3"/>
          </svg>
        </div>
      </div>
    </div>
    <div class="title-wrap">
      <div class="title">Lead Tracker</div>
      <div class="subtitle" id="offerSubtitle">Coinswitch</div>
    </div>
    <div class="form-wrap">
      <select class="select-box" id="offerSelect" onchange="updateSubtitle()">
        <option value="Coinswitch">Coinswitch</option>
      </select>
      <div class="pill" id="upiPill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M8 10v11M12 10v11M16 10v11M20 10v11" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <input type="text" id="upiInput" placeholder="Enter UPI ID"
          onfocus="document.getElementById('upiPill').classList.add('focused')"
          onblur="document.getElementById('upiPill').classList.remove('focused')"
          onkeypress="if(event.key==='Enter') trackNow()"/>
      </div>
      <div class="date-pill">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="3" stroke="#0ea5e9" stroke-width="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round"/><circle cx="8" cy="15" r="1.2" fill="#0ea5e9"/><circle cx="12" cy="15" r="1.2" fill="#0ea5e9"/><circle cx="16" cy="15" r="1.2" fill="#0ea5e9"/></svg>
        <input type="date" id="fromDate"/>
        <span class="date-sep">to</span>
        <input type="date" id="toDate" style="text-align:right;"/>
      </div>
      <button class="track-btn" id="trackBtn" onclick="trackNow()">
        <span>Track Now</span>
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </div>

  <div id="resultsWrap" style="display:none; margin-top:18px;">
    <div class="search-pill" id="searchPill">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="#94a3b8" stroke-width="2.2"/><path d="M20 20l-3-3" stroke="#94a3b8" stroke-width="2.2" stroke-linecap="round"/></svg>
      <input type="text" id="searchInput" placeholder="Search..."
        onfocus="document.getElementById('searchPill').classList.add('focused')"
        onblur="document.getElementById('searchPill').classList.remove('focused')"
        oninput="filterResults()"/>
    </div>
    <div id="resultsList"></div>
    <button class="back-btn" onclick="resetForm()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 6l-6 6 6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Search Again
    </button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SERVER = 'https://cashflix-upi.onrender.com';
let allResults = [];

const today = new Date().toISOString().slice(0, 10);
document.getElementById('fromDate').value = today;
document.getElementById('toDate').value = today;

window.addEventListener('load', function() {
  const parts = window.location.pathname.split('/');
  const upiFromUrl = decodeURIComponent(parts[parts.length - 1]);
  if (upiFromUrl && upiFromUrl.includes('@')) {
    document.getElementById('upiInput').value = upiFromUrl;
    trackNow();
  }
});

function updateSubtitle() {
  document.getElementById('offerSubtitle').innerText = document.getElementById('offerSelect').value;
}

function showToast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.style.background = ok ? '#22c55e' : '#ef4444';
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

async function trackNow() {
  const upi = document.getElementById('upiInput').value.trim();
  const offer = document.getElementById('offerSelect').value;
  const fromDate = document.getElementById('fromDate').value;
  const toDate = document.getElementById('toDate').value;
  const btn = document.getElementById('trackBtn');

  if (!upi || !upi.includes('@')) return showToast('Enter valid UPI ID', false);

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div><span>Tracking...</span>';

  try {
    const res = await fetch(`${SERVER}/tracker?upi=${encodeURIComponent(upi)}`);
    const data = await res.json();

    const from = new Date(fromDate);
    const to = new Date(toDate);
    to.setHours(23, 59, 59);

    if (!data.success) {
      allResults = [];
    } else {
      allResults = data.conversions.filter(c => {
        const cDate = new Date(c.time);
        return c.offer_name === offer && cDate >= from && cDate <= to;
      });
    }

    renderResults(allResults);
    document.getElementById('resultsWrap').style.display = 'block';

  } catch {
    showToast('Error! Try again.', false);
  }

  btn.disabled = false;
  btn.innerHTML = '<span>Track Now</span><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M5 12h14M13 6l6 6-6 6" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>';
}

function filterResults() {
  const s = document.getElementById('searchInput').value.toLowerCase();
  const filtered = allResults.filter(r =>
    !s || (r.status||'').toLowerCase().includes(s) || (r.event||'').toLowerCase().includes(s)
  );
  renderResults(filtered);
}

function renderResults(results) {
  const list = document.getElementById('resultsList');

  if (results.length === 0) {
    list.innerHTML = `
      <div class="no-result">
        <div class="no-result-title">No Records Found 📭</div>
        <div class="no-result-sub">Try different UPI ID or date range</div>
      </div>`;
    return;
  }

  list.innerHTML = results.map((r, i) => {
    const paid = r.status === 'paid';
    const pending = r.status === 'pending';
    const tracked = r.status === 'tracked';
    const badgeColor = paid ? '#22c55e' : pending ? '#f59e0b' : tracked ? '#0ea5e9' : '#ef4444';
    const badgeText = paid ? 'Paid' : pending ? 'Pending' : tracked ? 'Tracked' : r.status;

    const d = new Date(r.time);
    const date = d.toLocaleDateString('en-IN', {day:'2-digit', month:'2-digit', year:'numeric'});
    const time = d.toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit', hour12:true}).toUpperCase();

    return `
      <div class="result-card">
        <div class="result-row"><span class="row-label">SL NO.</span><span class="row-val">${i+1}</span></div>
        <div class="result-row"><span class="row-label">EVENT</span><span class="row-val">${r.event || 'install'}</span></div>
        <div class="result-row"><span class="row-label">STATUS</span><span class="badge" style="background:${badgeColor}">${badgeText}</span></div>
        <div class="result-row"><span class="row-label">AMOUNT</span><span class="row-val">₹${r.amount}</span></div>
        <div class="result-row"><span class="row-label">DATE</span><span class="row-val">${date}</span></div>
        <div class="result-row"><span class="row-label">TIME</span><span class="row-val">${time}</span></div>
      </div>`;
  }).join('');
}

function resetForm() {
  document.getElementById('resultsWrap').style.display = 'none';
  document.getElementById('searchInput').value = '';
  document.getElementById('upiInput').value = '';
  allResults = [];
}
</script>
</body>
</html>
