<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Track Status - CashFlix ⚡</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Nunito',sans-serif; background:#f0f4ff; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
.card { background:#fff; border-radius:24px; padding:24px; max-width:420px; width:100%; box-shadow:0 8px 32px rgba(0,0,0,0.10); border-top:4px solid #0d47a1; }
.header { display:flex; align-items:center; gap:14px; margin-bottom:20px; }
.app-icon { width:64px; height:64px; border-radius:16px; background:linear-gradient(135deg,#0d47a1,#1565c0); display:flex; align-items:center; justify-content:center; font-size:28px; flex-shrink:0; }
.header-text h1 { font-size:22px; font-weight:900; color:#1a1a2e; }
.header-text p { font-size:13px; color:#888; font-weight:600; }
.form-label { display:flex; align-items:center; gap:8px; font-size:14px; font-weight:800; color:#1a1a2e; margin-bottom:10px; }
.upi-input { width:100%; padding:14px 18px; border:2px solid #e8ecf4; border-radius:14px; font-size:15px; font-family:'Nunito',sans-serif; font-weight:700; color:#1a1a2e; outline:none; transition:border-color 0.2s; background:#f8f9ff; }
.upi-input:focus { border-color:#0d47a1; background:#fff; }
.upi-input::placeholder { color:#bbb; font-weight:600; }
.submit-btn { width:100%; padding:16px; background:linear-gradient(135deg,#0d47a1,#1565c0); color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:900; font-family:'Nunito',sans-serif; cursor:pointer; letter-spacing:1px; transition:all 0.2s; box-shadow:0 4px 16px rgba(13,71,161,0.4); margin-top:12px; }
.submit-btn:hover { transform:translateY(-2px); }
.submit-btn:disabled { opacity:0.7; cursor:not-allowed; transform:none; }
.error-msg { color:#e53935; font-size:13px; font-weight:700; margin-top:8px; display:none; }
.divider { height:1px; background:#f0f0f0; margin:20px 0; }
.powered { text-align:center; margin-top:20px; font-size:12px; color:#bbb; font-weight:700; }
.powered span { color:#0d47a1; }
.balance-box { background:linear-gradient(135deg,#0d47a1,#1565c0); border-radius:18px; padding:20px; margin-bottom:20px; position:relative; overflow:hidden; }
.balance-box::after { content:''; position:absolute; right:-20px; top:-20px; width:120px; height:120px; background:rgba(255,255,255,0.08); border-radius:50%; }
.balance-label { font-size:11px; font-weight:800; color:rgba(255,255,255,0.8); letter-spacing:1.5px; text-transform:uppercase; margin-bottom:6px; }
.balance-amount { font-size:48px; font-weight:900; color:#fff; line-height:1; margin-bottom:8px; }
.balance-amount span { font-size:28px; }
.balance-upi { font-size:13px; color:rgba(255,255,255,0.8); font-weight:700; }
.section-title { font-size:15px; font-weight:800; color:#1a1a2e; margin-bottom:12px; }
.conversion-item { background:#f8f9ff; border-radius:14px; margin-bottom:10px; overflow:hidden; border:1px solid #e8ecf4; }
.conversion-row { display:flex; justify-content:space-between; align-items:center; padding:12px 16px; border-bottom:1px solid #e8ecf4; }
.conversion-row:last-child { border-bottom:none; }
.row-label { font-size:13px; font-weight:800; color:#1a1a2e; }
.row-val { font-size:13px; font-weight:700; color:#555; }
.badge { padding:4px 12px; border-radius:20px; font-size:11px; font-weight:800; }
.badge-paid { background:#e8f5e9; color:#2e7d32; }
.badge-tracked { background:#e3f2fd; color:#0d47a1; }
.badge-pending { background:#fff3e0; color:#f57c00; }
.no-data { text-align:center; padding:20px; color:#888; font-size:14px; font-weight:700; }
.spinner { display:none; text-align:center; padding:20px; }
.spinner-icon { width:40px; height:40px; border:4px solid #e8ecf4; border-top:4px solid #0d47a1; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto; }
@keyframes spin { to{transform:rotate(360deg)} }
.result { display:none; }
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="app-icon">⚡</div>
    <div class="header-text">
      <h1>Lead Tracker</h1>
      <p>Check your cashback status</p>
    </div>
  </div>

  <div id="searchForm">
    <div class="form-label"><span>💳</span> Enter Your UPI ID</div>
    <input type="text" class="upi-input" id="upiInput" placeholder="example@upi" />
    <div class="error-msg" id="errorMsg">⚠️ Please enter a valid UPI ID!</div>
    <button class="submit-btn" id="searchBtn" onclick="searchStatus()">TRACK NOW</button>
  </div>

  <div class="spinner" id="spinner">
    <div class="spinner-icon"></div>
  </div>

  <div class="result" id="result">
    <div class="divider"></div>
    <div class="balance-box">
      <div class="balance-label">TOTAL EARNINGS</div>
      <div class="balance-amount"><span>₹</span><span id="totalEarnings">0</span></div>
      <div class="balance-upi" id="maskedUpi"></div>
    </div>
    <div class="section-title">📋 Conversions</div>
    <div id="conversionsList"></div>
    <button class="submit-btn" onclick="resetForm()" style="margin-top:10px;">🔍 Search Again</button>
  </div>

  <div class="powered">Powered by <span>CashFlix ⚡</span></div>
</div>

<script>
const SERVER = 'https://cashflix-upi.onrender.com';

// ✅ URL se UPI auto fill
window.addEventListener('load', function() {
  const path = window.location.pathname;
  const parts = path.split('/');
  const upiFromUrl = decodeURIComponent(parts[parts.length - 1]);
  if (upiFromUrl && upiFromUrl.includes('@')) {
    document.getElementById('upiInput').value = upiFromUrl;
    searchStatus();
  }
});

async function searchStatus() {
  const upi = document.getElementById('upiInput').value.trim();
  const errorMsg = document.getElementById('errorMsg');
  const searchBtn = document.getElementById('searchBtn');

  if (!upi || !upi.includes('@')) {
    errorMsg.style.display = 'block';
    return;
  }

  errorMsg.style.display = 'none';
  searchBtn.innerText = 'Tracking...';
  searchBtn.disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('result').style.display = 'none';
  document.getElementById('searchForm').style.display = 'none';

  try {
    const res = await fetch(`${SERVER}/tracker?upi=${encodeURIComponent(upi)}`);
    const data = await res.json();

    document.getElementById('spinner').style.display = 'none';

    if (!data.success) {
      document.getElementById('searchForm').style.display = 'block';
      errorMsg.innerText = '⚠️ UPI not found!';
      errorMsg.style.display = 'block';
      searchBtn.innerText = 'TRACK NOW';
      searchBtn.disabled = false;
      return;
    }

    document.getElementById('totalEarnings').innerText = parseFloat(data.total_earnings).toFixed(2);
    document.getElementById('maskedUpi').innerText = data.upi_id;

    const list = document.getElementById('conversionsList');
    if (data.conversions.length === 0) {
      list.innerHTML = '<div class="no-data">No conversions yet!</div>';
    } else {
      list.innerHTML = data.conversions.map((c, i) => `
        <div class="conversion-item">
          <div class="conversion-row"><span class="row-label">SL NO.</span><span class="row-val">${i+1}</span></div>
          <div class="conversion-row"><span class="row-label">OFFER</span><span class="row-val">${c.offer_name}</span></div>
          <div class="conversion-row"><span class="row-label">EVENT</span><span class="row-val">${c.event}</span></div>
          <div class="conversion-row"><span class="row-label">AMOUNT</span><span class="row-val">₹${c.amount}</span></div>
          <div class="conversion-row"><span class="row-label">STATUS</span><span class="badge badge-${c.status}">${c.status}</span></div>
          <div class="conversion-row"><span class="row-label">DATE</span><span class="row-val">${new Date(c.time).toLocaleDateString('en-IN')}</span></div>
          <div class="conversion-row"><span class="row-label">TIME</span><span class="row-val">${new Date(c.time).toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit',hour12:true}).toUpperCase()}</span></div>
        </div>
      `).join('');
    }

    document.getElementById('result').style.display = 'block';

  } catch(e) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('searchForm').style.display = 'block';
    errorMsg.innerText = '⚠️ Error! Try again.';
    errorMsg.style.display = 'block';
    searchBtn.innerText = 'TRACK NOW';
    searchBtn.disabled = false;
  }
}

function resetForm() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('searchForm').style.display = 'block';
  document.getElementById('upiInput').value = '';
  document.getElementById('searchBtn').innerText = 'TRACK NOW';
  document.getElementById('searchBtn').disabled = false;
}

document.getElementById('upiInput').addEventListener('keypress', function(e) {
  if (e.key === 'Enter') searchStatus();
});
</script>
</body>
  </html>
